name: Tests

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  checks: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: purcell/setup-emacs@master
        with:
          version: '29.1'

      - name: Clone dependencies
        run: |
          git clone --depth 1 https://github.com/xenodium/acp.el ../acp
          git clone --depth 1 https://github.com/xenodium/shell-maker ../shell-maker
          git clone --depth 1 https://bitbucket.org/olanilsson/ert-junit ../ert-junit

      - name: Run tests
        run: |
          emacs --batch -Q \
            -L . \
            -L ../acp \
            -L ../shell-maker \
            -L ../ert-junit \
            --load ert-junit \
            --load tests/agent-shell-fakes.el \
            $(find tests -name '*-tests.el' | sort | sed 's/^/--load /') \
            -f ert-junit-run-tests-batch-and-exit \
            test-results.xml

      - name: Report test results
        uses: dorny/test-reporter@v1
        if: always()
        # Reporter needs `checks: write' on GITHUB_TOKEN; for PRs from
        # forks GitHub downgrades the token to read-only, so this step
        # fails with "Resource not accessible by integration".
        # `continue-on-error' keeps the workflow green in that case —
        # the actual test pass/fail is still reflected by the `Run
        # tests' step above.
        continue-on-error: true
        with:
          name: ERT Tests
          path: test-results.xml
          reporter: java-junit
